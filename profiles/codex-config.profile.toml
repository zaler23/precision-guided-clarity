# Precision-Guided Clarity v1.0
# Optional Codex config snippet for ~/.codex/config.toml.

# Optional: make PGC the default selected Codex config profile.
# Leave commented if you prefer explicit use via: codex --profile pgc
# profile = "pgc"

[profiles.pgc]
# Keep AGENTS.md as the primary instruction carrier.
# Install the profile by copying or merging repo AGENTS.md into:
#   ~/.codex/AGENTS.md

# Keep the default unless you have a specific reason to change it.
project_doc_max_bytes = 32768

# Codex Desktop compatibility only:
# Uncomment only if your setup already uses this replacement instruction file
# and you have appended profiles/codex-desktop-instructions.append.md into it.
# model_instructions_file = "/absolute/path/to/desktop-instructions.md"
